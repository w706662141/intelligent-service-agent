services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent_qdrant  # 对应 --name
    ports:
      - "6333:6333"               # 对应 -p
      - "6334:6334"               # 建议同时开启 gRPC 端口
    volumes:
      # 关键修改：将原本的具名卷改成“相对路径”
      # ./qdrant_data 是你项目下的文件夹，/qdrant/storage 是容器内路径
      - ./qdrant_data:/qdrant/storage
    restart: always